<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capybara Meow: Math Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Comic Sans MS', 'Fredoka One', cursive, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none;}
        #game-container { position: relative; width: 100%; max-width: 800px; height: 100vw; max-height: 400px; border: 6px solid #4CAF50; border-radius: 15px; background-color: #87CEEB; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: pointer; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; padding: 10px 15px; font-size: 20px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.2); border-radius: 10px; margin: 10px;}
        
        #score-display { top: 0; left: 0; border-left: 5px solid #FFC107;}
        #highscore-display { top: 0; left: 50%; transform: translateX(-50%); border-bottom: 5px solid #E91E63; color: #FFEB3B;}
        #level-display { top: 0; right: 0; border-right: 5px solid #2196F3;}
        #hearts-display { top: 50px; left: 0; color: #ff4757; text-shadow: 1px 1px 2px black; font-size: 24px;}
        
        #lang-btn { position: absolute; bottom: 15px; right: 15px; padding: 8px 15px; font-size: 16px; cursor: pointer; pointer-events: auto; background-color: #FFC107; border: 3px solid #FF9800; border-radius: 8px; font-weight: bold; color: #333; transition: transform 0.1s;}
        #lang-btn:active { transform: scale(0.95); }
        
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; display: none; z-index: 10; text-align: center;}
        #game-over h1 { font-size: 40px; margin-bottom: 5px; color: #FFEB3B; text-shadow: 3px 3px 0 #F44336; }
        #go-score { font-size: 28px; font-weight: bold; margin: 10px 0; }
        #go-highscore { font-size: 22px; color: #4FC3F7; margin: 5px 0;}
        #go-newrecord { font-size: 26px; color: #00E676; font-weight: bold; text-shadow: 2px 2px 0 #1B5E20; display: none; margin: 5px 0; animation: pulse 1s infinite;}
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        #restart-btn { padding: 12px 30px; font-size: 24px; font-weight: bold; cursor: pointer; background-color: #4CAF50; border: 4px solid #2E7D32; border-radius: 12px; color: white; margin-top: 15px; transition: background 0.2s;}
        #restart-btn:hover { background-color: #45a049; }
        
        #instructions { position: absolute; bottom: 15px; left: 15px; font-size: 14px; font-weight: bold; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 8px; border: 2px solid #ccc; color: #333;}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="ui-layer">
        <div id="score-display" class="hud">Điểm: 0</div>
        <div id="highscore-display" class="hud">Kỷ lục: 0</div>
        <div id="level-display" class="hud">Cấp: 1</div>
        <div id="hearts-display" class="hud">❤️❤️❤️</div>
        <div id="instructions">Chạm TRÊN / DƯỚI để né!</div>
        <button id="lang-btn" onclick="toggleLanguage()">English</button>
        
        <div id="game-over">
            <h1 id="go-title">TRÒ CHƠI KẾT THÚC!</h1>
            <p id="go-score">Điểm: 0</p>
            <p id="go-highscore">Kỷ lục: 0</p>
            <p id="go-newrecord">🏆 KỶ LỤC MỚI! 🏆</p>
            <button id="restart-btn" onclick="resetGame()">Chơi Lại</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- AUDIO SYSTEM ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playTone(frequency, type, duration, vol=0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        correct: () => { playTone(600, 'sine', 0.1); setTimeout(()=>playTone(800, 'sine', 0.2), 100); },
        wrong: () => { playTone(150, 'sawtooth', 0.3, 0.2); setTimeout(()=>playTone(100, 'sawtooth', 0.4, 0.2), 150); },
        move: () => { playTone(300, 'triangle', 0.1, 0.05); setTimeout(()=>playTone(400, 'triangle', 0.1, 0.05), 50); },
        win: () => { playTone(400, 'sine', 0.1); setTimeout(()=>playTone(600, 'sine', 0.1), 100); setTimeout(()=>playTone(800, 'sine', 0.3), 200); }
    };

    // --- AUDIO UNLOCKER ---
    let audioUnlocked = false;
    function unlockAudio() {
        if (!audioUnlocked) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; 
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(0); oscillator.stop(audioCtx.currentTime + 0.001);
            audioUnlocked = true;
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('mousedown', unlockAudio);
        }
    }
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('mousedown', unlockAudio, { once: true });

    // --- PARTICLE SYSTEM ---
    let particles = [];
    function emitParticles(x, y, type) {
        let count = type === 'dust' ? 2 : 30;
        for(let i=0; i<count; i++) {
            let color = type === 'correct' ? ['#FFD700', '#00E676', '#00B0FF', '#FF4081'][Math.floor(Math.random() * 4)] : 
                        type === 'wrong' ? '#D32F2F' : 'rgba(255, 255, 255, 0.5)';
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * (type === 'dust' ? 4 : 12),
                vy: (Math.random() - 0.5) * (type === 'dust' ? 2 : 12) - (type==='dust'? 1 : 0),
                life: 1.0, decay: type === 'dust' ? 0.05 : 0.02, color: color,
                size: Math.random() * (type === 'dust' ? 4 : 6) + 2
            });
        }
    }
    function updateAndDrawParticles() {
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            if(p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
        }
    }

    // --- GAME STATE & LOCAL STORAGE ---
    const dict = {
        'vi': { score: "Điểm: ", highscore: "Kỷ lục: ", level: "Cấp: ", instructions: "Chạm TRÊN/DƯỚI để chuyển làn!", gameOver: "TRÒ CHƠI KẾT THÚC!", yourScore: "Điểm: ", restart: "Chơi Lại", langBtn: "English", newRecord: "🏆 KỶ LỤC MỚI! 🏆" },
        'en': { score: "Score: ", highscore: "Best: ", level: "Lv: ", instructions: "Tap TOP/BOTTOM to switch lanes!", gameOver: "GAME OVER!", yourScore: "Score: ", restart: "Play Again", langBtn: "Tiếng Việt", newRecord: "🏆 NEW RECORD! 🏆" }
    };
    
    let currentLang = 'vi';
    let score = 0, level = 1, hearts = 3, gameSpeed = 3.5;
    let isGameOver = false, animationId, frameCount = 0, bgOffset = 0, screenShake = 0;
    
    // ĐỌC HIGH SCORE TỪ LOCAL STORAGE
    let highScore = localStorage.getItem('capyMeowHighScore') || 0;
    highScore = parseInt(highScore);

    // --- DRAWING HELPERS ---
    function drawRoundedRect(ctx, x, y, width, height, radius, fillStyle) {
        ctx.fillStyle = fillStyle; ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.fill();
    }

    // --- PLAYER ---
    const player = {
        x: 100, y: 220, targetY: 220, lane: 0,
        move: function() {
            this.y += (this.targetY - this.y) * 0.15; 
            if (frameCount % 5 === 0) emitParticles(this.x, this.y + 10, 'dust');
        },
        draw: function() {
            let bounce = Math.sin(frameCount * 0.3) * 3, legSwing = Math.sin(frameCount * 0.4) * 10;
            ctx.save(); ctx.translate(this.x, this.y + bounce);
            ctx.strokeStyle = "#E65100"; ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(-10, 5); ctx.quadraticCurveTo(-30, -10 + bounce, -20, -25 + bounce); ctx.stroke();
            ctx.strokeStyle = "#F57C00"; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(5, 10); ctx.lineTo(5 + legSwing, 25); ctx.stroke(); ctx.beginPath(); ctx.moveTo(15, 10); ctx.lineTo(15 - legSwing, 25); ctx.stroke(); ctx.beginPath(); ctx.moveTo(40, 10); ctx.lineTo(40 - legSwing, 25); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50, 10); ctx.lineTo(50 + legSwing, 25); ctx.stroke();
            drawRoundedRect(ctx, 0, -15, 60, 30, 15, "#FF9800");
            ctx.fillStyle = "#E65100"; ctx.fillRect(15, -15, 4, 10); ctx.fillRect(25, -15, 4, 10); ctx.fillRect(35, -15, 4, 10);
            ctx.fillStyle = "#FF9800"; ctx.beginPath(); ctx.arc(60, -5, 18, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#E65100"; ctx.beginPath(); ctx.moveTo(50, -15); ctx.lineTo(55, -28); ctx.lineTo(62, -18); ctx.fill(); ctx.beginPath(); ctx.moveTo(60, -18); ctx.lineTo(68, -28); ctx.lineTo(72, -12); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(64, -8, 4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(65, -8, 2, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "pink"; ctx.beginPath(); ctx.arc(74, -2, 2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(65, 0); ctx.lineTo(55, 2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(65, 3); ctx.lineTo(55, 6); ctx.stroke();
            ctx.translate(15, -35); 
            drawRoundedRect(ctx, 0, -20, 35, 35, 12, "#8D6E63"); ctx.fillStyle = "#5D4037"; ctx.beginPath(); ctx.arc(10, 12, 4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(25, 12, 4, 0, Math.PI*2); ctx.fill(); drawRoundedRect(ctx, 15, -30, 28, 22, 10, "#8D6E63");
            ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(32, -22); ctx.lineTo(38, -22); ctx.stroke(); ctx.fillStyle = "#4E342E"; ctx.fillRect(40, -15, 4, 6);
            drawRoundedRect(ctx, 12, -40, 25, 10, 5, "#D4E157"); ctx.fillRect(8, -32, 35, 4); ctx.fillStyle = "#333"; ctx.font = "bold 10px Arial"; ctx.fillText("+-", 18, -32);
            ctx.restore();
        }
    };

    // --- MATH GATE ---
    let currentGate = null;
    function generateMathGate() {
        let num1, num2, answer, fakeAnswer, operatorStr;
        if (level === 1) { num1 = Math.floor(Math.random() * 10) + 1; num2 = Math.floor(Math.random() * 10) + 1; answer = num1 + num2; operatorStr = "+"; } 
        else { num1 = Math.floor(Math.random() * 20) + 10; num2 = Math.floor(Math.random() * 10) + 1; if (Math.random() > 0.5) { answer = num1 + num2; operatorStr = "+"; } else { answer = num1 - num2; operatorStr = "-"; } }
        fakeAnswer = answer + (Math.floor(Math.random() * 4) + 1) * (Math.random() > 0.5 ? 1 : -1); if (fakeAnswer === answer) fakeAnswer += 1;
        let isTopCorrect = Math.random() > 0.5;
        currentGate = { x: canvas.width + 50, equation: `${num1} ${operatorStr} ${num2} = ?`, topAnswer: isTopCorrect ? answer : fakeAnswer, bottomAnswer: isTopCorrect ? fakeAnswer : answer, correctLane: isTopCorrect ? -1 : 1, passed: false };
    }

    // --- ĐIỀU KHIỂN ---
    function movePlayer(direction) {
        if (isGameOver) return;
        if (audioCtx.state === 'suspended') audioCtx.resume(); 
        
        if (direction === 'up') { player.lane = -1; player.targetY = 120; sfx.move(); } 
        else if (direction === 'down') { player.lane = 1; player.targetY = 280; sfx.move(); }
    }

    window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") movePlayer('up');
        else if (e.key === "ArrowDown") movePlayer('down');
    });

    function handleTouch(e) {
        if (isGameOver) return;
        e.preventDefault(); 
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let rect = canvas.getBoundingClientRect();
        let y = clientY - rect.top;
        let scaleY = canvas.height / rect.height; 
        let canvasY = y * scaleY;

        if (canvasY < canvas.height / 2) movePlayer('up');
        else movePlayer('down');
    }

    canvas.addEventListener("touchstart", handleTouch, {passive: false});
    canvas.addEventListener("mousedown", handleTouch);

    // --- GAME LOOP ---
    function update() {
        if (isGameOver) return;
        frameCount++; bgOffset -= gameSpeed * 0.5; if (bgOffset <= -800) bgOffset = 0;
        player.move();
        if (currentGate) {
            currentGate.x -= gameSpeed;
            if (currentGate.x < player.x && !currentGate.passed) {
                currentGate.passed = true;
                if (player.lane === currentGate.correctLane) {
                    score += 10; sfx.correct(); emitParticles(player.x + 50, player.y, 'correct');
                    if (score % 50 === 0) { level++; gameSpeed += 0.5; }
                } else {
                    hearts--; sfx.wrong(); screenShake = 15; emitParticles(player.x + 50, player.y, 'wrong');
                    if (hearts <= 0) endGame();
                }
                updateUI();
            }
            if (currentGate.x < -200) generateMathGate();
        }
    }

    function draw() {
        ctx.save(); 
        if (screenShake > 0) { let dx = (Math.random() - 0.5) * screenShake; let dy = (Math.random() - 0.5) * screenShake; ctx.translate(dx, dy); screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0; }
        let grd = ctx.createLinearGradient(0, 0, 0, 150); grd.addColorStop(0, "#4FC3F7"); grd.addColorStop(1, "#E1F5FE"); ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#81C784"; ctx.beginPath(); ctx.arc(bgOffset + 200, 200, 150, Math.PI, 0); ctx.arc(bgOffset + 500, 200, 200, Math.PI, 0); ctx.arc(bgOffset + 900, 200, 150, Math.PI, 0); ctx.fill();
        ctx.fillStyle = "#AED581"; ctx.fillRect(0, 150, canvas.width, 250);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.setLineDash([30, 20]); ctx.beginPath(); ctx.moveTo(bgOffset, 250); ctx.lineTo(bgOffset + canvas.width * 2, 250); ctx.stroke(); ctx.setLineDash([]);
        if (currentGate) {
            ctx.fillStyle = "#5D4037"; ctx.fillRect(currentGate.x + 40, 50, 20, 350); ctx.fillRect(currentGate.x + 140, 50, 20, 350);
            drawRoundedRect(ctx, currentGate.x + 10, 20, 180, 60, 10, "#FFCA28"); ctx.lineWidth = 4; ctx.strokeStyle = "#FF8F00"; ctx.strokeRect(currentGate.x + 10, 20, 180, 60); ctx.fillStyle = "#3E2723"; ctx.font = "bold 28px 'Fredoka One', Arial"; ctx.textAlign = "center"; ctx.fillText(currentGate.equation, currentGate.x + 100, 60);
            drawRoundedRect(ctx, currentGate.x + 50, 90, 100, 60, 15, "#29B6F6"); ctx.fillStyle = "white"; ctx.font = "bold 32px Arial"; ctx.fillText(currentGate.topAnswer, currentGate.x + 100, 132);
            drawRoundedRect(ctx, currentGate.x + 50, 250, 100, 60, 15, "#EC407A"); ctx.fillStyle = "white"; ctx.fillText(currentGate.bottomAnswer, currentGate.x + 100, 292);
        }
        player.draw(); updateAndDrawParticles(); ctx.restore();
    }

    function loop() { update(); draw(); if (!isGameOver) animationId = requestAnimationFrame(loop); }

    function updateUI() {
        const text = dict[currentLang];
        document.getElementById("score-display").innerText = text.score + score; 
        document.getElementById("highscore-display").innerText = text.highscore + highScore; 
        document.getElementById("level-display").innerText = text.level + level; 
        document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts)); 
        document.getElementById("instructions").innerText = text.instructions; 
        document.getElementById("lang-btn").innerText = text.langBtn; 
        document.getElementById("go-title").innerText = text.gameOver; 
        document.getElementById("restart-btn").innerText = text.restart;
    }

    function toggleLanguage() { currentLang = currentLang === 'vi' ? 'en' : 'vi'; updateUI(); }

    function endGame() { 
        isGameOver = true; 
        cancelAnimationFrame(animationId); 
        
        const text = dict[currentLang];
        let isNewRecord = false;

        // XỬ LÝ LƯU KỶ LỤC MỚI
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('capyMeowHighScore', highScore);
            isNewRecord = true;
            sfx.win(); // Phát nhạc chiến thắng
        }

        // Cập nhật text trên màn hình Game Over
        document.getElementById("go-score").innerText = text.yourScore + score;
        document.getElementById("go-highscore").innerText = text.highscore + highScore;
        
        if (isNewRecord && score > 0) {
            document.getElementById("go-newrecord").innerText = text.newRecord;
            document.getElementById("go-newrecord").style.display = "block";
            document.getElementById("go-highscore").style.display = "none";
        } else {
            document.getElementById("go-newrecord").style.display = "none";
            document.getElementById("go-highscore").style.display = "block";
        }

        document.getElementById("game-over").style.display = "flex"; 
    }

    function resetGame() {
        score = 0; level = 1; hearts = 3; gameSpeed = 3.5; isGameOver = false; frameCount = 0; particles = [];
        player.targetY = 220; player.lane = 0; player.y = 220;
        document.getElementById("game-over").style.display = "none";
        updateUI(); generateMathGate(); loop(); 
    }

    // Init
    updateUI(); generateMathGate(); loop();

</script>
</body>
</html>
